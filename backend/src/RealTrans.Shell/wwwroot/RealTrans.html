<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RealTrans — In-place translation, reimagined</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div id="root"></div>

<!-- Vendored locally (see wwwroot/vendor) so the app renders offline / behind a
     proxy. Loading these from a CDN meant any network hiccup or integrity-hash
     mismatch left the entire UI blank (Babel never runs → no .jsx executes). -->
<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- Shared primitives (Icon, Wordmark, Pill, ThinkingDots) -->
<script type="text/babel" src="ui.jsx"></script>
<!-- Scenario data (SCENARIOS constant used by palette + selection) -->
<script type="text/babel" src="data.jsx"></script>
<!-- Overlay components -->
<script type="text/babel" src="palette.jsx"></script>
<script type="text/babel" src="selection.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<script type="text/babel" src="notes.jsx"></script>
<!-- Production control panel + translation feed -->
<script type="text/babel" src="control-panel.jsx"></script>
<!-- WebView2 IPC bridge (must load before app.jsx) -->
<script src="bridge.js"></script>
<!-- Main entry point -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
