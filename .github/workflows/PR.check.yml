name: PR. Build

on:
  workflow_dispatch:
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on
    env:
      Solution_Name: backend/RealTrans.sln
      SkipBinariesExtract: true   # Skip download additional binaries, those are set in cproj as a prebuilt step
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Run checkout@v4/setup-dotnet@v4 on Node 24 (they still default to deprecated Node 20)
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore $env:Solution_Name

    - name: Build the application
      run: dotnet build $env:Solution_Name /p:Configuration=Release --no-restore
